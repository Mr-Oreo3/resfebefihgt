<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Resfebe Battle – YTFL</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a1628;--surface:#132240;--surface2:#1a2d52;
  --gold:#c9a227;--goldl:#e8c55a;--red:#d62828;
  --green:#1fd172;--wrong:#e84545;
  --text:#f0e6c8;--muted:#8fa3c8;
  --border:rgba(201,162,39,.25);
  --player:#3b82f6;--enemy:#e84545;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
  background-image:radial-gradient(ellipse at 15% 0%,#1a3566 0%,transparent 55%),
                   radial-gradient(ellipse at 85% 100%,#2a1a08 0%,transparent 55%);}

/* ═══ SCREENS ═══ */
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}

/* ═══ MENU ═══ */
#menu{align-items:center;justify-content:center;gap:1.2rem;padding:1.5rem;}
.menu-logo{display:flex;flex-direction:column;align-items:center;gap:.6rem;}
.menu-logo img{width:80px;height:80px;border-radius:50%;border:3px solid var(--gold);
  box-shadow:0 0 24px rgba(201,162,39,.5);}
.menu-logo h1{font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,5vw,2.4rem);
  color:var(--gold);letter-spacing:1px;text-shadow:0 0 20px rgba(201,162,39,.4);}
.menu-logo p{color:var(--muted);font-size:.85rem;font-weight:600;}
.menu-btns{display:flex;flex-direction:column;gap:.7rem;width:100%;max-width:280px;}
.mbtn{font-family:'Fredoka One',cursive;font-size:1.1rem;border:none;border-radius:14px;
  padding:.8rem 1.5rem;cursor:pointer;transition:transform .15s,box-shadow .15s;
  letter-spacing:.5px;}
.mbtn:hover{transform:scale(1.04);}
.mbtn.primary{background:linear-gradient(135deg,var(--gold),#a07810);color:#0a1628;
  box-shadow:0 6px 20px rgba(201,162,39,.4);}
.mbtn.secondary{background:var(--surface2);color:var(--text);border:1.5px solid var(--border);}
.mbtn.secondary:hover{border-color:var(--goldl);}

/* ═══ BATTLE SCREEN ═══ */
#battle{padding:0;}

/* header bar */
.battle-header{
  background:linear-gradient(90deg,#0d1e3d,#132240,#1a2d15);
  border-bottom:2px solid var(--gold);
  padding:.4rem .8rem;display:flex;align-items:center;gap:.5rem;flex-shrink:0;
  position:relative;}
.battle-header::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--goldl),transparent);opacity:.5;}
.bh-logo{display:flex;align-items:center;gap:.4rem;}
.bh-logo img{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--gold);}
.bh-title{font-family:'Fredoka One',cursive;font-size:.95rem;color:var(--gold);}
.bh-right{margin-left:auto;display:flex;align-items:center;gap:.5rem;}
#diff-selector{display:flex;gap:.25rem;}
.diff-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;
  padding:.2rem .5rem;border-radius:99px;border:1.5px solid var(--border);
  background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;}
.diff-btn.active{background:var(--gold);border-color:var(--gold);color:#0a1628;}

/* hp bars */
.hp-area{
  display:flex;align-items:center;gap:.6rem;
  padding:.5rem .8rem;flex-shrink:0;
  background:rgba(0,0,0,.25);}
.combatant{flex:1;display:flex;flex-direction:column;gap:.25rem;}
.combatant.enemy{align-items:flex-end;}
.c-label{font-size:.62rem;font-weight:800;letter-spacing:.8px;text-transform:uppercase;}
.combatant.player .c-label{color:var(--player);}
.combatant.enemy  .c-label{color:var(--wrong);}
.hp-track{height:14px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;width:100%;}
.hp-fill{height:100%;border-radius:99px;transition:width .4s ease;}
.combatant.player .hp-fill{background:linear-gradient(90deg,#2563eb,#60a5fa);}
.combatant.enemy  .hp-fill{background:linear-gradient(90deg,#dc2626,#f87171);}
.hp-text{font-family:'Fredoka One',cursive;font-size:.8rem;}
.combatant.player .hp-text{color:var(--player);}
.combatant.enemy  .hp-text{color:var(--wrong);}
.vs-badge{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--gold);
  flex-shrink:0;text-shadow:0 0 10px rgba(201,162,39,.5);}

/* fighters */
.fighters{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:.3rem 1rem;flex-shrink:0;height:90px;position:relative;}
.fighter{font-size:3.2rem;line-height:1;transition:transform .15s;}
.fighter.player{transform-origin:bottom left;}
.fighter.enemy {transform-origin:bottom right;}
.fighter.attack-right{animation:atkR .3s ease;}
.fighter.attack-left {animation:atkL .3s ease;}
.fighter.hurt        {animation:hurt .3s ease;}
@keyframes atkR{0%{transform:translateX(0)}50%{transform:translateX(22px)}100%{transform:translateX(0)}}
@keyframes atkL{0%{transform:translateX(0)}50%{transform:translateX(-22px)}100%{transform:translateX(0)}}
@keyframes hurt{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.dmg-float{position:absolute;font-family:'Fredoka One',cursive;font-size:1.2rem;
  pointer-events:none;animation:dmgUp .8s ease forwards;}
@keyframes dmgUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}

/* puzzle area */
.puzzle-area{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:.5rem .8rem;gap:.7rem;overflow:hidden;}
.puzzle-emojis{
  background:var(--surface2);border:2px solid var(--border);border-radius:18px;
  padding:.7rem 1.4rem;font-size:clamp(1.6rem,6vw,2.4rem);
  letter-spacing:3px;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.4);}
.puzzle-label{font-size:.68rem;color:var(--muted);font-weight:800;letter-spacing:1px;
  text-transform:uppercase;}

/* timer ring */
.timer-wrap{display:flex;align-items:center;gap:.5rem;}
.timer-ring{position:relative;width:42px;height:42px;flex-shrink:0;}
.timer-ring svg{transform:rotate(-90deg);}
.timer-ring circle.bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:4;}
.timer-ring circle.fg{fill:none;stroke:var(--gold);stroke-width:4;
  stroke-dasharray:107;stroke-dashoffset:0;
  transition:stroke-dashoffset .9s linear,stroke .3s;stroke-linecap:round;}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:1rem;color:var(--gold);}

/* choices */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;width:100%;max-width:460px;}
.choice-btn{
  font-family:'Nunito',sans-serif;font-weight:800;
  font-size:clamp(.72rem,2.5vw,.9rem);
  padding:.55rem .7rem;border-radius:14px;
  border:2px solid var(--border);background:var(--surface2);
  color:var(--text);cursor:pointer;
  transition:transform .12s,background .12s,border-color .12s;
  text-align:center;line-height:1.25;min-height:48px;
  display:flex;align-items:center;justify-content:center;}
.choice-btn:hover:not(:disabled){background:#1e3566;border-color:var(--goldl);transform:translateY(-2px);}
.choice-btn:disabled{cursor:default;}
.choice-btn.correct-flash{background:rgba(31,209,114,.2);border-color:var(--green);color:var(--green);
  animation:btnPop .3s ease;}
.choice-btn.wrong-flash {background:rgba(232,69,69,.2); border-color:var(--wrong);color:var(--wrong);
  animation:btnShk .3s ease;}
.choice-btn.reveal      {background:rgba(31,209,114,.1);border-color:var(--green);}
@keyframes btnPop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes btnShk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* result overlay (inside battle) */
#result-overlay{
  position:absolute;inset:0;background:rgba(5,12,26,.88);
  display:none;align-items:center;justify-content:center;
  z-index:40;backdrop-filter:blur(4px);}
#result-overlay.show{display:flex;}
.result-card{
  background:linear-gradient(135deg,var(--surface),var(--surface2));
  border-radius:22px;padding:1.2rem 1.5rem;max-width:340px;width:90%;
  border:1.5px solid var(--border);
  box-shadow:0 16px 50px rgba(0,0,0,.6);
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.result-word{font-family:'Fredoka One',cursive;font-size:1.6rem;color:var(--gold);
  display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.25rem;}
.result-tr  {color:var(--muted);font-weight:700;font-size:.88rem;margin-bottom:.6rem;}
.result-ex  {background:rgba(255,255,255,.05);border-radius:10px;padding:.55rem .7rem;
  font-size:.83rem;line-height:1.55;border:1px solid rgba(255,255,255,.07);}
.result-ex em{color:var(--goldl);font-style:normal;font-weight:800;}
.result-tr-ex{color:var(--muted);font-size:.78rem;margin-top:.25rem;}
.result-cd{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.8rem;}
.cd-ring{position:relative;width:40px;height:40px;flex-shrink:0;}
.cd-ring svg{transform:rotate(-90deg);}
.cd-ring circle.bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:4;}
.cd-ring circle.fg{fill:none;stroke:var(--gold);stroke-width:4;
  stroke-dasharray:107;stroke-dashoffset:0;
  transition:stroke-dashoffset .9s linear,stroke .3s;stroke-linecap:round;}
.cd-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:1rem;color:var(--gold);}
.cd-label{font-size:.72rem;color:var(--muted);font-weight:700;}
.speak-btn{background:none;border:1.5px solid var(--green);color:var(--green);
  border-radius:99px;font-family:'Nunito',sans-serif;font-weight:800;
  font-size:.75rem;padding:.22rem .7rem;cursor:pointer;
  display:inline-flex;align-items:center;gap:.25rem;transition:background .15s;}
.speak-btn:hover{background:rgba(31,209,114,.12);}
.speak-btn.speaking{animation:spkPulse .5s infinite alternate;}
@keyframes spkPulse{from{opacity:1}to{opacity:.3}}

/* game-over overlay */
#gameover-overlay{
  position:absolute;inset:0;background:rgba(5,12,26,.92);
  display:none;align-items:center;justify-content:center;
  z-index:50;backdrop-filter:blur(6px);}
#gameover-overlay.show{display:flex;}
.go-card{background:linear-gradient(135deg,var(--surface),var(--surface2));
  border-radius:26px;padding:2rem 1.8rem;max-width:340px;width:90%;
  text-align:center;border:1.5px solid var(--border);
  box-shadow:0 24px 70px rgba(0,0,0,.7);
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
.go-emoji{font-size:3.5rem;line-height:1;margin-bottom:.5rem;}
.go-title{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--gold);margin-bottom:.3rem;}
.go-sub  {color:var(--muted);font-size:.9rem;margin-bottom:1.2rem;line-height:1.5;}
.go-stats{display:flex;gap:.6rem;justify-content:center;margin-bottom:1.2rem;}
.gstat{flex:1;border-radius:12px;padding:.6rem;font-family:'Fredoka One',cursive;}
.gstat.c{background:rgba(31,209,114,.1);color:var(--green); border:1px solid rgba(31,209,114,.25);}
.gstat.w{background:rgba(232,69,69,.1); color:var(--wrong); border:1px solid rgba(232,69,69,.25);}
.gstat.a{background:rgba(201,162,39,.1);color:var(--gold);  border:1px solid var(--border);}
.gstat .gv{font-size:1.8rem;line-height:1;}
.gstat .gl{font-size:.6rem;font-family:'Nunito',sans-serif;font-weight:800;
  text-transform:uppercase;letter-spacing:.7px;}
.go-btns{display:flex;flex-direction:column;gap:.5rem;}
.go-btn{font-family:'Fredoka One',cursive;font-size:1rem;border:none;border-radius:12px;
  padding:.7rem 1.5rem;cursor:pointer;transition:transform .15s;}
.go-btn:hover{transform:scale(1.04);}
.go-btn.primary{background:linear-gradient(135deg,var(--gold),#a07810);color:#0a1628;}
.go-btn.secondary{background:var(--surface2);color:var(--text);border:1.5px solid var(--border);}

/* ═══ DICTIONARY SCREEN ═══ */
#dictionary{padding:0;}
.dict-header{background:linear-gradient(90deg,#0d1e3d,#132240);
  border-bottom:2px solid var(--gold);padding:.6rem 1rem;
  display:flex;align-items:center;gap:.7rem;flex-shrink:0;}
.dict-back{background:none;border:1.5px solid var(--border);color:var(--muted);
  border-radius:99px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;
  padding:.25rem .75rem;cursor:pointer;transition:all .15s;}
.dict-back:hover{border-color:var(--goldl);color:var(--goldl);}
.dict-title{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--gold);}
.dict-search{margin:0 .8rem;padding:.5rem .8rem;flex-shrink:0;}
.dict-search input{width:100%;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:12px;padding:.45rem .8rem;color:var(--text);font-family:'Nunito',sans-serif;
  font-size:.88rem;outline:none;transition:border-color .2s;}
.dict-search input:focus{border-color:var(--goldl);}
.dict-search input::placeholder{color:var(--muted);}
.dict-list{flex:1;overflow-y:auto;padding:.5rem .8rem .8rem;}
.dict-list::-webkit-scrollbar{width:4px;}
.dict-list::-webkit-scrollbar-thumb{background:rgba(201,162,39,.3);border-radius:99px;}
.dict-item{background:var(--surface2);border:1.5px solid var(--border);border-radius:14px;
  padding:.8rem 1rem;margin-bottom:.5rem;cursor:pointer;transition:border-color .2s,background .2s;}
.dict-item:hover{border-color:var(--goldl);background:#1e3566;}
.dict-item-top{display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-wrap:wrap;}
.di-emoji{font-size:1.1rem;color:var(--muted);flex:1;min-width:0;font-size:.82rem;}
.di-answer{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--gold);}
.di-tr    {font-size:.8rem;color:var(--muted);font-weight:700;}
.dict-item-detail{display:none;margin-top:.6rem;padding-top:.6rem;
  border-top:1px solid var(--border);}
.dict-item.open .dict-item-detail{display:block;}
.di-pron{font-size:.78rem;color:var(--goldl);font-style:italic;margin-bottom:.3rem;}
.di-ex  {background:rgba(255,255,255,.04);border-radius:8px;padding:.45rem .6rem;
  font-size:.8rem;line-height:1.5;}
.di-ex em{color:var(--goldl);font-style:normal;font-weight:800;}
.di-extr{color:var(--muted);font-size:.75rem;margin-top:.2rem;}
.di-speak{margin-top:.4rem;}

/* battle screen position:relative for overlays */
#battle{position:relative;}
</style>
</head>

// ═══ SOUND ENGINE ══════════════════════════════════════════════
const AudioCtx = window.AudioContext||window.webkitAudioContext;
let _ac=null;
function ac(){ if(!_ac)_ac=new AudioCtx(); return _ac; }

function snd(freqs,type,vol,gap){
  try{
    const c=ac(), t=c.currentTime;
    freqs.forEach((f,i)=>{
      const o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type=type; o.frequency.value=f;
      g.gain.setValueAtTime(0,t+i*gap);
      g.gain.linearRampToValueAtTime(vol,t+i*gap+0.03);
      g.gain.exponentialRampToValueAtTime(0.001,t+i*gap+0.3);
      o.start(t+i*gap); o.stop(t+i*gap+0.35);
    });
  }catch(e){}
}
const playCorrect = ()=> snd([523,659,784],'sine',.28,.11);
const playWrong   = ()=> snd([220,180,150],'sawtooth',.18,.09);
const playWin     = ()=> snd([523,659,784,1047],'sine',.3,.15);
const playLose    = ()=> snd([392,349,311,261],'sawtooth',.22,.17);
const playHit     = ()=> snd([150,120],'square',.15,.08);

// ═══ SPEECH ════════════════════════════════════════════════════
function getBestVoice(){
  const vs=window.speechSynthesis.getVoices();
  const ok=v=>v.lang.toLowerCase().startsWith('en')&&!v.name.toLowerCase().includes('turkish');
  return vs.find(v=>v.lang==='en-US'&&ok(v))||vs.find(v=>v.lang==='en-GB'&&ok(v))||vs.find(ok)||null;
}
function speak(text,btn){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  if(currentSpeakBtn){currentSpeakBtn.classList.remove('speaking');currentSpeakBtn=null;}
  const go=()=>{
    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.82; u.pitch=1;
    const v=getBestVoice(); if(v){u.voice=v;u.lang=v.lang;}else{u.lang='en-US';}
    if(btn){currentSpeakBtn=btn;btn.classList.add('speaking');
      u.onend=u.onerror=()=>{btn.classList.remove('speaking');currentSpeakBtn=null;};}
    window.speechSynthesis.speak(u);
  };
  window.speechSynthesis.getVoices().length>0?go():
    (window.speechSynthesis.onvoiceschanged=()=>{window.speechSynthesis.onvoiceschanged=null;go();});
}

// ═══ SHUFFLE ═══════════════════════════════════════════════════
function shuffle(a){
  const r=[...a];
  for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}
  return r;
}

// ═══ BATTLE START ══════════════════════════════════════════════
function startBattle(){
  const d = DIFF[chosenDiff];
  playerHp   = PLAYER_MAX_HP;
  enemyHp    = d.enemyHp;
  enemyMaxHp = d.enemyHp;
  correct = wrong = 0;
  remaining  = shuffle([...ALL_PUZZLES]);
  gameActive = true;
  updateHpBars();
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('gameover-overlay').classList.remove('show');
  showScreen('battle');
  nextQuestion();
}

// ═══ HP BARS ═══════════════════════════════════════════════════
function updateHpBars(){
  const pPct = (playerHp/PLAYER_MAX_HP)*100;
  const ePct = (enemyHp/enemyMaxHp)*100;
  document.getElementById('player-hp-fill').style.width = Math.max(0,pPct)+'%';
  document.getElementById('enemy-hp-fill').style.width  = Math.max(0,ePct)+'%';
  document.getElementById('player-hp-text').textContent = `${Math.max(0,playerHp)} / ${PLAYER_MAX_HP}`;
  document.getElementById('enemy-hp-text').textContent  = `${Math.max(0,enemyHp)} / ${enemyMaxHp}`;
  // colour player bar when low
  const pFill = document.getElementById('player-hp-fill');
  pFill.style.background = playerHp===1
    ? 'linear-gradient(90deg,#dc2626,#f87171)'
    : 'linear-gradient(90deg,#2563eb,#60a5fa)';
}

// ═══ NEXT QUESTION ═════════════════════════════════════════════
function nextQuestion(){
  if(!gameActive) return;
  if(remaining.length===0) remaining=shuffle([...ALL_PUZZLES]);

  // pick puzzle
  const idx = Math.floor(Math.random()*remaining.length);
  currentPuzzle = remaining.splice(idx,1)[0];

  // pick 3 wrong choices from other puzzles
  const others = ALL_PUZZLES.filter(p=>p.answer!==currentPuzzle.answer);
  const wrongs  = shuffle(others).slice(0,3).map(p=>p.answer);
  currentChoices = shuffle([currentPuzzle.answer, ...wrongs]);

  // render puzzle
  document.getElementById('puzzle-emojis').textContent = currentPuzzle.emojis;

  // render choices
  const cb = document.getElementById('choices');
  cb.innerHTML='';
  currentChoices.forEach(ans=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=ans;
    btn.onclick=()=>onChoice(ans,btn);
    cb.appendChild(btn);
  });

  startTimer();
}

// ═══ TIMER ═════════════════════════════════════════════════════
function startTimer(){
  clearInterval(timerInterval);
  const total = DIFF[chosenDiff].time;
  timerSecs = total;
  const circ = 2*Math.PI*17; // r=17
  const fg = document.getElementById('timer-fg');
  const tn = document.getElementById('timer-num');
  fg.style.strokeDasharray  = circ;
  fg.style.strokeDashoffset = 0;
  fg.style.stroke = 'var(--gold)';
  tn.textContent = timerSecs;
  tn.style.color = 'var(--gold)';

  timerInterval = setInterval(()=>{
    timerSecs--;
    tn.textContent = timerSecs;
    fg.style.strokeDashoffset = circ*(1-timerSecs/total);
    if(timerSecs<=1){fg.style.stroke='var(--wrong)';tn.style.color='var(--wrong)';}
    if(timerSecs<=0){
      clearInterval(timerInterval);
      onTimeout();
    }
  },1000);
}

function stopTimer(){ clearInterval(timerInterval); }

// ═══ CHOICE HANDLER ════════════════════════════════════════════
function onChoice(answer, btn){
  if(!gameActive) return;
  stopTimer();
  disableChoices();

  if(answer===currentPuzzle.answer){
    correct++;
    playCorrect();
    btn.classList.add('correct-flash');
    enemyHp--;
    updateHpBars();
    animateFighter('player','attack-right');
    animateFighter('enemy','hurt');
    showDmg('enemy','-1 ❤️','var(--green)');
    setTimeout(()=>{
      if(!gameActive)return;
      if(enemyHp<=0){ endBattle('win'); return; }
      showResult(true);
    },400);
  } else {
    wrong++;
    playWrong();
    btn.classList.add('wrong-flash');
    // reveal correct
    document.querySelectorAll('.choice-btn').forEach(b=>{
      if(b.textContent===currentPuzzle.answer) b.classList.add('reveal');
    });
    loseLife();
  }
}

function onTimeout(){
  if(!gameActive) return;
  wrong++;
  playHit();
  // reveal correct
  document.querySelectorAll('.choice-btn').forEach(b=>{
    if(b.textContent===currentPuzzle.answer) b.classList.add('reveal');
  });
  loseLife();
}

function loseLife(){
  playerHp--;
  updateHpBars();
  animateFighter('enemy','attack-left');
  animateFighter('player','hurt');
  showDmg('player','-1 💔','var(--wrong)');
  setTimeout(()=>{
    if(!gameActive)return;
    if(playerHp<=0){ endBattle('lose'); return; }
    showResult(false);
  },400);
}

function disableChoices(){
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
}

// ═══ FIGHTER ANIMATIONS ════════════════════════════════════════
function animateFighter(who, cls){
  const el = document.getElementById('fighter-'+who);
  el.classList.remove('attack-right','attack-left','hurt');
  void el.offsetWidth;
  el.classList.add(cls);
  setTimeout(()=>el.classList.remove(cls),350);
}

function showDmg(who, text, color){
  const fighters = document.getElementById('fighters');
  const el = document.createElement('div');
  el.className='dmg-float';
  el.textContent=text;
  el.style.color=color;
  el.style.fontFamily="'Fredoka One',cursive";
  el.style.left  = who==='enemy' ? '65%' : '20%';
  el.style.bottom= '10px';
  el.style.position='absolute';
  fighters.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

// ═══ RESULT PANEL (after each question) ════════════════════════
function showResult(wasCorrect){
  const p = currentPuzzle;
  const overlay = document.getElementById('result-overlay');
  const card    = document.getElementById('result-card');
  const total   = 5;
  const circ    = 2*Math.PI*17;

  const icon = wasCorrect ? '✅' : '❌';
  const borderCol = wasCorrect ? 'var(--green)' : 'var(--wrong)';
  card.style.borderColor = borderCol;

  card.innerHTML=`
    <div class="result-word">
      ${icon} ${p.answer}
      <button class="speak-btn" id="res-speak">🔊 Dinle</button>
    </div>
    <div class="result-tr">🇹🇷 ${p.tr} &nbsp;·&nbsp; <em style="color:var(--goldl);font-style:normal">${p.pron}</em></div>
    <div class="result-ex">
      <div class="en">💬 ${p.ex}</div>
      <div class="result-tr-ex">🇹🇷 ${p.exTr}</div>
    </div>
    <div class="result-cd">
      <div class="cd-ring">
        <svg width="40" height="40" viewBox="0 0 40 40">
          <circle class="bg" cx="20" cy="20" r="17"/>
          <circle class="fg" id="res-fg" cx="20" cy="20" r="17"
            style="stroke-dasharray:${circ};stroke-dashoffset:0"/>
        </svg>
        <div class="cd-num" id="res-num">${total}</div>
      </div>
      <span class="cd-label">saniye içinde devam ediyor</span>
    </div>
  `;

  overlay.classList.add('show');

  setTimeout(()=>{
    const sb=document.getElementById('res-speak');
    if(sb) speak(p.answer,sb);
  },200);
  document.getElementById('res-speak').onclick=()=>speak(p.answer,document.getElementById('res-speak'));

  let secs=total;
  clearInterval(resultCdInterval);
  resultCdInterval=setInterval(()=>{
    secs--;
    const fg=document.getElementById('res-fg');
    const nn=document.getElementById('res-num');
    if(nn) nn.textContent=secs;
    if(fg) fg.style.strokeDashoffset=circ*(1-secs/total);
    if(fg&&secs<=2) fg.style.stroke='var(--wrong)';
    if(secs<=0){
      clearInterval(resultCdInterval);
      overlay.classList.remove('show');
      nextQuestion();
    }
  },1000);
}

// ═══ END BATTLE ════════════════════════════════════════════════
function endBattle(result){
  gameActive=false;
  stopTimer();
  clearInterval(resultCdInterval);
  document.getElementById('result-overlay').classList.remove('show');

  if(result==='win'){playWin();}else{playLose();}

  const total = correct+wrong;
  const pct   = total>0?Math.round(correct/total*100):0;
  const emoji = result==='win'?'🏆':'💀';
  const title = result==='win'?'Kazandın!':'Kaybettin!';
  const sub   = result==='win'
    ? 'Düşmanı yendin! Harika iş! 🎉'
    : 'Canların bitti. Tekrar dene! 💪';

  const card = document.getElementById('go-card');
  card.innerHTML=`
    <div class="go-emoji">${emoji}</div>
    <div class="go-title">${title}</div>
    <div class="go-sub">${sub}</div>
    <div class="go-stats">
      <div class="gstat c"><div class="gv">${correct}</div><div class="gl">✅ Doğru</div></div>
      <div class="gstat w"><div class="gv">${wrong}</div><div class="gl">❌ Yanlış</div></div>
      <div class="gstat a"><div class="gv">${pct}%</div><div class="gl">🎯 İsabet</div></div>
    </div>
    <div class="go-btns">
      <button class="go-btn primary" onclick="startBattle()">🔄 Tekrar Oyna</button>
      <button class="go-btn secondary" onclick="goMenu()">🏠 Ana Menü</button>
    </div>
  `;
  document.getElementById('gameover-overlay').classList.add('show');
}

function stopAll(){
  gameActive=false;
  stopTimer();
  clearInterval(resultCdInterval);
  window.speechSynthesis&&window.speechSynthesis.cancel();
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('gameover-overlay').classList.remove('show');
}

// ═══ DICTIONARY ════════════════════════════════════════════════
function buildDict(filter=''){
  const list = document.getElementById('dict-list');
  list.innerHTML='';
  const fl = filter.toLowerCase();
  const items = fl
    ? ALL_PUZZLES.filter(p=>
        p.answer.toLowerCase().includes(fl)||
        p.tr.toLowerCase().includes(fl)||
        p.pron.toLowerCase().includes(fl))
    : [...ALL_PUZZLES].sort((a,b)=>a.answer.localeCompare(b.answer));

  items.forEach(p=>{
    const div=document.createElement('div');
    div.className='dict-item';
    div.innerHTML=`
      <div class="dict-item-top">
        <span class="di-emoji">${p.emojis}</span>
        <span class="di-answer">${p.answer}</span>
        <span class="di-tr">${p.tr}</span>
      </div>
      <div class="dict-item-detail">
        <div class="di-pron">${p.pron}</div>
        <div class="di-ex">
          <span class="en">💬 ${p.ex}</span>
          <div class="di-extr">🇹🇷 ${p.exTr}</div>
        </div>
        <div class="di-speak">
          <button class="speak-btn" onclick="event.stopPropagation();speak('${p.answer.replace(/'/g,"\\'")}',this)">🔊 Dinle</button>
        </div>
      </div>
    `;
    div.addEventListener('click',()=>div.classList.toggle('open'));
    list.appendChild(div);
  });
  if(!items.length){
    list.innerHTML='<div style="text-align:center;color:var(--muted);padding:2rem;font-weight:700">Sonuç bulunamadı</div>';
  }
}

function filterDict(){
  buildDict(document.getElementById('dict-input').value);
}

// preload voices
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}
</script>
